<!DOCTYPE html>
<html>
<head>
<title>Happy 1 Month Anniversary Meri Rasmalai ❤️</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
text-align:center;
overflow-x:hidden;
}

/* Title */

h1{
color:white;
margin-top:30px;
font-size:40px;
}

/* Slideshow */

.slideshow img{
width:320px;
border-radius:15px;
display:none;
margin:20px auto;
}

/* Flip cards */

.container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
width:200px;
height:200px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
overflow:hidden;
}

.card-front img{
width:100%;
height:100%;
object-fit:cover;
}

.card-back{
background:white;
color:#ff2e63;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
transform:rotateY(180deg);
font-size:16px;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-10px;
color:red;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

</style>

</head>

<body>

<h1>Happy 1 Month Anniversary ❤️</h1>

<!-- Slideshow Section -->

<div class="slideshow">

<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
<img src="image5.jpg">

</div>


<!-- Flip Cards Section -->

<div class="container">

<div class="card" onclick="flip(this)">
<div class="card-inner">

<div class="card-front">
<img src="photo1.jpg">
</div>

<div class="card-back">
<!-- WRITE YOUR MESSAGE FOR PHOTO 1 BELOW -->
You make every moment special ❤️
</div>

</div>
</div>


<div class="card" onclick="flip(this)">
<div class="card-inner">

<div class="card-front">
<img src="photo2.jpg">
</div>

<div class="card-back">
<!-- WRITE YOUR MESSAGE FOR PHOTO 2 BELOW -->
One month with you feels magical ✨
</div>

</div>
</div>


<div class="card" onclick="flip(this)">
<div class="card-inner">

<div class="card-front">
<img src="photo3.jpg">
</div>

<div class="card-back">
<!-- WRITE YOUR MESSAGE FOR PHOTO 3 BELOW -->
I can't wait for many more memories with you 💕
</div>

</div>
</div>

</div>


<!-- Background Music -->

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>


<script>

/* Start music on first click */

document.addEventListener("click", function() {
let music = document.getElementById("bgmusic");
music.play();
}, { once: true });


/* Slideshow */

let slideIndex=0;
let slides=document.querySelectorAll(".slideshow img");

function showSlides(){

slides.forEach(img=>img.style.display="none");

slideIndex++;

if(slideIndex>slides.length){
slideIndex=1;
}

slides[slideIndex-1].style.display="block";

setTimeout(showSlides,2000);

}

showSlides();


/* Flip Animation */

function flip(card){
card.classList.toggle("flip");
}


/* Floating Hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

}

setInterval(createHeart,300);


/* Heart Explosion on Load */

function heartExplosion(){

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";

heart.style.left="50%";

heart.style.top="50%";

heart.style.fontSize="25px";

heart.style.transform=`translate(${(Math.random()-0.5)*800}px, ${(Math.random()-0.5)*600}px)`;

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);

}

}

window.onload=heartExplosion;

</script>

</body>
</html>
